<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StitchFlow</title>
    <style>
        :root {
            --primary: #008080;
            --bg: #f1f2f6;
            --text: #2f3542;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px; padding-bottom: 100px;
        }

        .header h1 { color: var(--primary); text-align: center; margin: 0; font-size: 26px; }

        /* SEARCH BAR */
        .search-container { margin: 15px 0; }
        #searchInput {
            width: 100%; padding: 12px 20px;
            border-radius: 25px; border: 1px solid #ddd;
            font-size: 16px; box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tabs button {
            background: #dcdde1; border: none; padding: 10px 25px;
            border-radius: 25px; font-weight: bold; color: #57606f;
        }
        .tabs button.active { background: var(--primary); color: white; }

        /* CARDS & ANIMATION */
        .task-card {
            background: white; padding: 18px; border-radius: 20px;
            margin-bottom: 15px; display: flex; justify-content: space-between;
            align-items: center; border-left: 8px solid #ccc;
            transition: transform 0.4s ease, opacity 0.4s ease; /* Animation */
        }

        /* The "Slide Out" effect */
        .removing {
            transform: translateX(100%);
            opacity: 0;
        }

        .urgent-card { border-left-color: var(--primary) !important; }

        .done-btn {
            background: #2ed573; color: white; border: none;
            width: 45px; height: 45px; border-radius: 12px; font-weight: bold;
        }

        .add-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--primary); color: white;
            width: 65px; height: 65px; border-radius: 50%;
            border: none; font-size: 35px; z-index: 999;
            display: flex; align-items: center; justify-content: center;
        }

/* MODAL UPGRADE */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.4); /* Softer background dim */
    backdrop-filter: blur(8px); /* Modern blur effect */
    z-index: 1000;
}

.modal-content {
    background: white;
    margin: 10% auto;
    padding: 30px;
    width: 88%;
    border-radius: 32px; /* Super rounded corners */
    box-sizing: border-box;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    animation: popup 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Bouncy entry */
}

@keyframes popup {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.modal-content h2 {
    font-size: 24px;
    color: var(--text);
    margin-bottom: 20px;
    text-align: center;
}

/* Styled Input Fields */
input {
    width: 100%;
    padding: 16px;
    margin-bottom: 15px;
    border: 2px solid #eee;
    border-radius: 16px;
    font-size: 16px;
    box-sizing: border-box;
    transition: border-color 0.3s;
    outline: none;
    background: #fcfcfc;
}

input:focus {
    border-color: var(--primary);
    background: white;
}

/* Date Picker styling specifically */
input[type="date"] {
    font-family: inherit;
    color: #555;
}

.save-btn {
    width: 100%;
    padding: 18px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 18px;
    font-weight: bold;
    font-size: 18px;
    margin-top: 10px;
    box-shadow: 0 8px 20px rgba(0, 128, 128, 0.3);
    cursor: pointer;
}

.cancel-btn {
    display: block;
    text-align: center;
    color: #a4b0be;
    margin-top: 20px;
    font-weight: 600;
    text-decoration: none;
    font-size: 14px;
}

    </style>
</head>
<body>

    <div class="header">
        <h1>Stitch Flow</h1>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="renderTasks()" placeholder="🔍 Search customer name...">
    </div>

    <div class="tabs">
        <button id="focusBtn" class="active" onclick="switchTab('focus')">Focus</button>
        <button id="allBtn" onclick="switchTab('all')">All Orders</button>
    </div>

    <div id="task-list"></div>

    <button class="add-btn" onclick="openModal()">+</button>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Add Order</h2>
            <input type="text" id="custName" placeholder="Customer Name">
            <input type="text" id="itemDetail" placeholder="Item Name">
           <label style="display:block; margin: 15px 0 5px 10px; font-weight: bold; color: #747d8c; font-size: 14px;">Delivery Date:</label>
<input type="date" id="deliveryDate" placeholder="Select Delivery Date" required>

            <button class="save-btn" onclick="saveTask()">Save Task</button>
            <p onclick="closeModal()" style="text-align:center; color:grey; margin-top:15px;">Cancel</p>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('mom_tasks')) || [];
        let currentView = 'focus';

        function switchTab(view) {
            currentView = view;
            document.getElementById('focusBtn').className = (view === 'focus' ? 'active' : '');
            document.getElementById('allBtn').className = (view === 'all' ? 'active' : '');
            renderTasks();
        }

        function saveTask() {
            const name = document.getElementById('custName').value;
            const item = document.getElementById('itemDetail').value;
            const date = document.getElementById('deliveryDate').value;

            if(name && item && date) {
                tasks.push({ id: Date.now(), name, item, deliveryDate: date });
                localStorage.setItem('mom_tasks', JSON.stringify(tasks));
                closeModal();
                renderTasks();
                // Reset inputs
                document.getElementById('custName').value = "";
                document.getElementById('itemDetail').value = "";
                document.getElementById('deliveryDate').value = "";
            }
        }

        // NEW ANIMATED DELETE
        function deleteTask(id, element) {
            // Add the animation class
            element.parentElement.classList.add('removing');
            
            // Wait for animation to finish (400ms) before deleting data
            setTimeout(() => {
                tasks = tasks.filter(t => t.id !== id);
                localStorage.setItem('mom_tasks', JSON.stringify(tasks));
                renderTasks();
            }, 400);
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            const search = document.getElementById('searchInput').value.toLowerCase();
            list.innerHTML = "";
            
            const today = new Date();
            today.setHours(0,0,0,0);

            let count = 0;

            // Sort by Date
            tasks.sort((a,b) => new Date(a.deliveryDate) - new Date(b.deliveryDate));

            tasks.forEach(task => {
                const delivery = new Date(task.deliveryDate);
                const alertDate = new Date(delivery);
                alertDate.setDate(delivery.getDate() - 2);
                alertDate.setHours(0,0,0,0);

                const isUrgent = today >= alertDate;
                const matchesSearch = task.name.toLowerCase().includes(search);

                if (matchesSearch && (currentView === 'all' || isUrgent)) {
                    count++;
                    list.innerHTML += `
                        <div class="task-card ${isUrgent ? 'urgent-card' : ''}">
                            <div class="task-info">
                                <h2>${task.name}</h2>
                                <p>${task.item}</p>
                                <p><strong>Due:</strong> ${task.deliveryDate}</p>
                            </div>
                            <button class="done-btn" onclick="deleteTask(${task.id}, this)">✓</button>
                        </div>
                    `;
                }
            });

            if (count === 0) {
                list.innerHTML = `<div class="empty-state" style="text-align:center; color:grey; margin-top:30px;"><h3>Nothing found!</h3></div>`;
            }
        }

        function openModal() { document.getElementById('modal').style.display = 'block'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        renderTasks();
    </script>
</body>
